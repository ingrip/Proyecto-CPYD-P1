<!DOCTYPE html>
<html>
<head>
<title>Chats Disponibles</title>
<style>
body{font-family:Poppins;background:#fbbcbf;text-align:center;}
.contenedor{display:flex;flex-direction:column;gap:20px;width:300px;margin:auto;margin-top:50px;}
button{padding:12px;border:none;border-radius:15px;font-size:16px;cursor:pointer;}
h2{color:white;}
</style>
</head>
<body>

<h2>Chats Disponibles</h2>

<div class="contenedor">
    <h3>Comunidades</h3>
    <div id="comunidades">
        <button onclick="entrarComunidad('general')">💬 General</button>
        <button onclick="entrarComunidad('gatos')">🐱 Gatos</button>
        <button onclick="entrarComunidad('gaming')">🎮 Gaming</button>
        <button onclick="entrarComunidad('programacion')">💻 Programación</button>
    </div>

    <h3>Usuarios Activos</h3>
    <div id="usuarios_activos">
        <!-- se llenará con JS -->
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const socket = io();
let usuario = JSON.parse(localStorage.getItem("usuario"));
if(!usuario){ alert("Debes iniciar sesión"); window.location="/login"; }

socket.emit("join", { uid: usuario.uid, nombre: usuario.nombre });

// comunidades
function entrarComunidad(nombre){
    window.location = "/chat/" + nombre;
}

// usuarios activos
socket.on("usuarios_activos", function(lista){
    const div = document.getElementById("usuarios_activos");
    div.innerHTML = "";
    lista.forEach(u=>{
        const btn = document.createElement("button");
        btn.innerText = u.nombre;
        btn.onclick = ()=>abrirChatPrivado(u.uid, u.nombre);
        div.appendChild(btn);
    });
});

function abrirChatPrivado(uid, nombre){
    localStorage.setItem("chatPrivadoActual", JSON.stringify({uid, nombre}));
    window.location = "/chat/" + nombre; // redirigir a chat
}
</script>

</body>
</html>
