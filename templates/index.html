<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Plati-cats</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fbbcbf,#ffd6ec,#c2f0ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
}

.logo{
width:260px;
animation:flotar 3s ease-in-out infinite;
}

@keyframes flotar{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

h1{
margin-top:20px;
font-weight:600;
color:#333;
}

button{
margin-top:30px;
padding:14px 35px;
border:none;
border-radius:30px;
font-size:18px;
background:linear-gradient(90deg,#e08989,#dba76d);
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
}

</style>
</head>

<body>

<img src="{{ url_for('static', filename='logo.png') }}" class="logo">

<h1>Bienvenido a Plati-cats 🐾</h1>

<a href="/login">
<button>Iniciar sesión</button>
</a>

</body>
</html>
